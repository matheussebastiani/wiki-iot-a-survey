<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki - IoT Survey</title>

  <!-- TEMA ESCURO -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <!-- ALERT BOX STYLE -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts/dist/style.css">

</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Wiki - IoT Survey',
      loadSidebar: false,
      loadNavbar: false,
      subMaxLevel: 6,
      auto2top: true,

      flexibleAlerts: {
        note: {
          label: "Nota"
        },
        tip: {
          label: "Dica"
        },
        warning: {
          label: "Aviso"
        },
        attention: {
          label: "Atenção"
        }
      }
    }
  </script>

  <!-- DOCSIFY -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- ALERT PLUGIN -->
  <script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>

</body>
</html>
